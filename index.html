<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Place-Time — Five Towns Spatial History</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 0.5rem 1rem; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; color: #e94560; }
    header .subtitle { font-size: 0.8rem; color: #888; }
    #controls { display: flex; gap: 1rem; align-items: center; padding: 0.5rem 1rem; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; }
    .control-group { display: flex; flex-direction: column; gap: 0.2rem; }
    label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
    #year-slider { width: 300px; accent-color: #e94560; }
    #year-display { font-size: 1rem; font-weight: bold; color: #e94560; min-width: 80px; }
    .layer-toggles { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .layer-btn { padding: 0.2rem 0.6rem; font-size: 0.75rem; border-radius: 3px; border: 1px solid; cursor: pointer; background: transparent; transition: all 0.15s; }
    .layer-btn.active { color: #1a1a2e; }
    #map { flex: 1; }
    #info-panel { position: absolute; bottom: 1rem; right: 1rem; width: 280px; background: rgba(22,33,62,0.95); border: 1px solid #0f3460; border-radius: 6px; padding: 0.8rem; z-index: 1000; font-size: 0.8rem; max-height: 40vh; overflow-y: auto; }
    #info-panel h3 { font-size: 0.9rem; margin-bottom: 0.4rem; color: #e94560; }
    .info-section { margin-bottom: 0.6rem; }
    .info-section h4 { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.2rem; }
    .info-item { padding: 0.15rem 0; border-bottom: 1px solid #0f3460; }
    .h3-badge { font-family: monospace; font-size: 0.7rem; background: #0f3460; padding: 0.1rem 0.3rem; border-radius: 2px; }
  </style>
</head>
<body>
  <header>
    <h1>Place-Time</h1>
    <span class="subtitle">Five Towns — Hexagonal Spatial History (Geological → Political)</span>
  </header>
  <div id="controls">
    <div class="control-group">
      <label>Year</label>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <input type="range" id="year-slider" min="-3400" max="2024" value="1086" step="1" />
        <span id="year-display">1086 CE</span>
      </div>
    </div>
    <div class="control-group">
      <label>Layers</label>
      <div class="layer-toggles" id="layer-toggles"></div>
    </div>
  </div>
  <div id="map"></div>
  <div id="info-panel">
    <h3>Click the map to query</h3>
    <p style="color:#888;font-size:0.75rem;">Select a location to see what was there at the chosen year.</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="/src/ui/app.ts"></script>
</body>
</html>
