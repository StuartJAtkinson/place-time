<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Place-Time</title>
  <link rel="stylesheet" href="/node_modules/cesium/Build/Cesium/Widgets/widgets.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #cesiumContainer { width: 100%; height: 100%; overflow: hidden; background: #060608; }
    .cesium-widget-credits { display: none; }

    #hint {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: system-ui, sans-serif;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="hint">CLICK a cell to show its column · ESC to deselect · G to home</div>
  <script type="module" src="/src/ui/app.ts"></script>
</body>
</html>
