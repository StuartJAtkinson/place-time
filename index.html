<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Place-Time</title>
  <link rel="stylesheet" href="/node_modules/cesium/Build/Cesium/Widgets/widgets.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #cesiumContainer { width: 100%; height: 100%; overflow: hidden; background: #060608; }
    .cesium-widget-credits { display: none; }

    /* ── Time panel ── */
    #time-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(6,6,12,0.88);
      border-top: 1px solid #1a1a2e;
      backdrop-filter: blur(6px);
      padding: 0.5rem 1rem 0.6rem;
      font-family: system-ui, sans-serif;
      color: #ccc;
      user-select: none;
    }

    .time-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.3rem;
      flex-wrap: wrap;
    }
    .time-row:last-child { margin-bottom: 0; }

    .era-label {
      font-size: 0.6rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      min-width: 52px;
      text-align: right;
      flex-shrink: 0;
    }

    .era-btn {
      font-size: 0.65rem;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      border: 1px solid #2a2a3e;
      background: transparent;
      color: #888;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
    }
    .era-btn:hover { border-color: #e94560; color: #e94560; }
    .era-btn.active { background: #e94560; color: #fff; border-color: #e94560; }

    .ce-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    #ce-slider {
      flex: 1;
      accent-color: #e94560;
      cursor: pointer;
    }
    #year-display {
      font-size: 0.9rem;
      font-weight: bold;
      color: #e94560;
      min-width: 90px;
      text-align: right;
    }
    #ce-input {
      width: 72px;
      background: #111;
      border: 1px solid #2a2a3e;
      border-radius: 3px;
      color: #ccc;
      font-size: 0.72rem;
      padding: 0.15rem 0.3rem;
      text-align: center;
    }
    #ce-input:focus { outline: none; border-color: #e94560; }

    #hint {
      position: absolute;
      top: 0.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: system-ui, sans-serif;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="hint">CLICK a cell · ESC deselect · G home</div>

  <div id="time-panel">

    <!-- Deep time milestones -->
    <div class="time-row">
      <span class="era-label">Deep time</span>
      <button class="era-btn" data-year="-13800000000" data-label="Big Bang">Big Bang<br><small style="opacity:.6">13.8 Ga</small></button>
      <button class="era-btn" data-year="-4540000000"  data-label="Earth forms">Earth<br><small style="opacity:.6">4.54 Ga</small></button>
      <button class="era-btn" data-year="-3800000000"  data-label="Oceans form">Oceans<br><small style="opacity:.6">3.8 Ga</small></button>
      <button class="era-btn" data-year="-2400000000"  data-label="O₂ event">O₂<br><small style="opacity:.6">2.4 Ga</small></button>
      <button class="era-btn" data-year="-540000000"   data-label="Cambrian">Cambrian<br><small style="opacity:.6">540 Ma</small></button>
      <button class="era-btn" data-year="-335000000"   data-label="Pangea assembled">Pangea<br><small style="opacity:.6">335 Ma</small></button>
      <button class="era-btn" data-year="-175000000"   data-label="Pangea breakup">Breakup<br><small style="opacity:.6">175 Ma</small></button>
      <button class="era-btn" data-year="-66000000"    data-label="K-Pg extinction">K-Pg<br><small style="opacity:.6">66 Ma</small></button>
      <button class="era-btn" data-year="-300000"      data-label="Homo sapiens">Humans<br><small style="opacity:.6">300 ka</small></button>
      <button class="era-btn" data-year="-10000"       data-label="End of last Ice Age">Ice Age end<br><small style="opacity:.6">10 ka</small></button>
    </div>

    <!-- Historical milestones -->
    <div class="time-row">
      <span class="era-label">History</span>
      <button class="era-btn" data-year="-6500" data-label="Doggerland submerged">Doggerland<br><small style="opacity:.6">6500 BCE</small></button>
      <button class="era-btn" data-year="-3000" data-label="First cities">Cities<br><small style="opacity:.6">3000 BCE</small></button>
      <button class="era-btn" data-year="-500"  data-label="Classical antiquity">Classical<br><small style="opacity:.6">500 BCE</small></button>
      <button class="era-btn active" data-year="0" data-label="Common Era">0 CE</button>
      <button class="era-btn" data-year="43"   data-label="Roman Britain">Roman<br><small style="opacity:.6">43 CE</small></button>
      <button class="era-btn" data-year="1066" data-label="Norman conquest">Norman<br><small style="opacity:.6">1066</small></button>
      <button class="era-btn" data-year="1086" data-label="Domesday Book">Domesday<br><small style="opacity:.6">1086</small></button>
      <button class="era-btn" data-year="1750" data-label="Industrial revolution">Industrial<br><small style="opacity:.6">1750</small></button>
      <button class="era-btn" data-year="1900" data-label="1900">1900</button>
      <button class="era-btn" data-year="2024" data-label="Today">Today</button>
    </div>

    <!-- CE fine slider -->
    <div class="time-row ce-row">
      <span class="era-label">CE year</span>
      <input type="range" id="ce-slider" min="0" max="2024" value="0" step="1" />
      <input type="number" id="ce-input" min="-100000" max="2100" value="0" />
      <span id="year-display">0 CE</span>
    </div>

  </div>

  <script type="module" src="/src/ui/app.ts"></script>
</body>
</html>
